services:
  postgres:
    image: postgres:16-alpine
    environment:
      POSTGRES_USER: consientemente
      POSTGRES_PASSWORD: consientemente_secret
      POSTGRES_DB: consientemente
    ports:
      - "5432:5432"
    volumes:
      - pgdata:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U consientemente"]
      interval: 5s
      timeout: 5s
      retries: 5

  api:
    build:
      context: .
      dockerfile: packages/api-server/Dockerfile
    ports:
      - "3001:3001"
    environment:
      DATABASE_URL: postgresql://consientemente:consientemente_secret@postgres:5432/consientemente
      PORT: "3001"
    depends_on:
      postgres:
        condition: service_healthy

volumes:
  pgdata:
